version: '3.8'

services:
  app:
    container_name: yotrade_app
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env.production
    networks:
      - yotrade_net

  nginx:
    container_name: yotrade_nginx
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - yotrade_net

  # Database
  db:
    image: postgres:15-alpine
    container_name: yotrade_db
    restart: always
    environment:
      POSTGRES_USER: ${Item_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${Item_POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${Item_POSTGRES_DB:-yotrade}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - yotrade_net

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

networks:
  yotrade_net:
    driver: bridge

volumes:
  db_data:
