name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS via Rsync
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "."
          target: "~/apps/yotrade"
          rm: true # Note: This will remove extra files on destination, be careful if you keep .env there

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/apps/yotrade
            # Ensure .env.production exists or copies from secret (if managed via secrets)
            # You might want to upload .env manually or manage it safely
            
            # Pull latest images if using prebuilt, otherwise build
            docker compose -f deploy/docker-compose.yml down
            docker compose -f deploy/docker-compose.yml up -d --build
            
            # Prune unused images
            docker image prune -f
