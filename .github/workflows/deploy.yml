name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

          # rm: true  <-- Disable this to keep persistent files like .env if you create them manually!
      
      - name: Create .env.production for Docker
        run: |
          echo "NEXT_PUBLIC_BASE_URL=https://www.yotradellc.com" > .env.production
          echo "DATABASE_URL=postgresql://postgres:password@db:5432/yotrade" >> .env.production

      - name: Build Docker Image
        run: |
          docker build -t yotrade_app:latest .
          docker save yotrade_app:latest | gzip > yotrade_app.tar.gz

      - name: Copy files to VPS via Rsync
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH }}
          port: 27753
          source: ".,yotrade_app.tar.gz"
          target: "~/apps/yotrade"
          rm: false # Changed to false to be safer, but Rsync usually handles overwrites fine.

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH }}
          port: 27753
          script: |
            cd ~/apps/yotrade
            # Check if .env.production exists
            if [ ! -f .env.production ]; then
              echo "Creating default .env.production..."
              echo "NEXT_PUBLIC_BASE_URL=https://www.yotradellc.com" > .env.production
              echo "DATABASE_URL=postgresql://postgres:password@db:5432/yotrade" >> .env.production
            fi
            
            # Load the pre-built image
            if [ -f yotrade_app.tar.gz ]; then
              gunzip -c yotrade_app.tar.gz | docker load
              rm yotrade_app.tar.gz
            fi

            # Start services (no build)
            docker compose -f deploy/docker-compose.yml down
            docker compose -f deploy/docker-compose.yml up -d
            
            # Prune unused images
            docker image prune -f
